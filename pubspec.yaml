name: gongdong
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  infinite_scroll_pagination: ^5.1.1
  form_field_validator: ^1.1.0
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  fluttertoast: ^9.0.0
  flutter_custom_icons: ^0.0.2
  indicator_bottom_navigationbar: ^0.0.1
  awesome_bottom_bar: ^1.2.4
  http: ^1.6.0
  scroll_loop_auto_scroll: ^0.0.5
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite_common_ffi: ^2.4.0+2
  flutter_launcher_icons: ^0.14.4
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.1
  flutter_reorderable_grid_view: ^5.5.3
  share_plus: ^12.0.1
  stroke_text: any
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
  fonts:
    - family: thonburi
      fonts:
        - asset: assets/fonts/SF Thonburi.ttf
    - family: supermarket
      fonts:
        - asset: assets/fonts/Supermarket.ttf
    - family: sarabun
      fonts:
        - asset: assets/fonts/Sarabun-Regular.ttf
    - family: print
      fonts:
        - asset: assets/fonts/PrintAble4U-Bold-ver-1.00.ttf
    - family: sukumvit
      fonts:
        - asset: assets/fonts/SukhumvitSet-Text.ttf
    - family: inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Bold.ttf
